<form id="contactForm">
  <h2>Contact Us</h2>
  <input type="text" id="contactName" placeholder="Your Name" required>
  <input type="email" id="contactEmail" placeholder="Your Email" required>
  <textarea id="contactMessage" placeholder="Your Message" required></textarea>
  <button type="submit">Send</button>
  <p id="contactMsg"></p>
</form>

<footer>
  <p>📍 SmartRetail, Narsipatnam, Andhra Pradesh, India</p>
  <p>📧 support@smartretail.com | 📞 +91-9876543210</p>
  <div class="socials">
    <a href="#">Facebook</a> | <a href="#">Instagram</a> | <a href="#">Twitter</a>
  </div>
  <p>© 2026 SmartRetail</p>
</footer>
<script>
    document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();
  let name = document.getElementById("contactName").value;
  let email = document.getElementById("contactEmail").value;
  let message = document.getElementById("contactMessage").value;

  if(!name || !email || !message){
    document.getElementById("contactMsg").innerText = "❌ Please fill all fields!";
    return;
  }
  if(!email.includes("@")){
    document.getElementById("contactMsg").innerText = "❌ Invalid email!";
    return;
  }
  document.getElementById("contactMsg").innerText = "✅ Message sent successfully!";
});
</script>
