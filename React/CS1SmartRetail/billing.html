<h2>Billing Summary</h2>
<div id="billingSummary"></div>
<button onclick="window.print()">🖨️ Print Bill</button>


<footer>
  <p>📍 SmartRetail, Narsipatnam, Andhra Pradesh, India</p>

    <a href="#">Facebook</a> | <a href="#">Instagram</a> | <a href="#">Twitter</a>
  </div>
  <p>© 2026 SmartRetail</p>
</footer>
<script>
    function showBilling(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let subtotal = cart.reduce((sum,item)=> sum + item.price*item.qty, 0);
  let tax = subtotal * 0.05; // 5% tax
  let total = subtotal + tax;

  document.getElementById("billingSummary").innerHTML = `
    <p>Subtotal: ₹${subtotal}</p>
    <p>Tax (5%): ₹${tax}</p>
    <p><strong>Total: ₹${total}</strong></p>
  `;
}
showBilling();
</script>
