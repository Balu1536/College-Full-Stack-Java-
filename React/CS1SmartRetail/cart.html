<h2>Your Cart</h2>
<div id="cartItems"></div>
<p id="cartTotal"></p> 


<footer>
  <p>📍 SmartRetail, Narsipatnam, Andhra Pradesh, India</p>
  <p>📧 support@smartretail.com | 📞 +91-9876543210</p>
  <div class="socials">
    <a href="#">Facebook</a> | <a href="#">Instagram</a> | <a href="#">Twitter</a>
  </div>
  <p>© 2026 SmartRetail</p>
</footer>
<script>
    function loadCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let container = document.getElementById("cartItems");
  container.innerHTML = "";
  let total = 0;
  cart.forEach((item,index)=>{
    total += item.price * item.qty;
    container.innerHTML += `
      <div>
        <img src="images/${item.name.toLowerCase()}.jpg" width="50">
        ${item.name} - ₹${item.price} x 
        <input type="number" value="${item.qty}" min="1" onchange="updateQty(${index},this.value)">
        <button onclick="removeItem(${index})">Remove</button>
      </div>`;
  });
  document.getElementById("cartTotal").innerText = "Total: ₹" + total;
}

function updateQty(index, qty){
  let cart = JSON.parse(localStorage.getItem("cart"));
  cart[index].qty = parseInt(qty);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

function removeItem(index){
  let cart = JSON.parse(localStorage.getItem("cart"));
  cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

loadCart();
</script>
</body>
