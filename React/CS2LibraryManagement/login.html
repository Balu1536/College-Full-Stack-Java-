<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav class="navbar">
  <div class="logo">📚 MyLibrary</div>
  <ul class="nav-links">
    <li><a href="home.html">Home</a></li>
    <li><a href="books.html">Books</a></li>
    <li><a href="issued.html">Issued Books</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li id="loginLink"><a href="login.html">Login</a></li>
    <li id="signupLink"><a href="signup.html">Signup</a></li>
    <li id="logoutLink" style="display:none;"><a href="#">Logout</a></li>
  </ul>
</nav>

<form id="loginForm">
  <h2>Login</h2>
  <input type="email" id="loginEmail" placeholder="Email" required>
  <input type="password" id="loginPassword" placeholder="Password" required>
  <button type="submit">Login</button>
  <p id="loginMessage"></p>
</form>
<footer>
  <p>📍 MyLibrary, Narsipatnam, Andhra Pradesh, India</p>
  <p>🕒 Mon–Sat: 9 AM – 8 PM</p>
  <p>📧 support@mylibrary.com</p>
  <div class="socials">
    <a href="#">Facebook</a> | <a href="#">Instagram</a> | <a href="#">Twitter</a>
  </div>
  <p>© 2026 MyLibrary</p>
</footer>
<script>
document.addEventListener("DOMContentLoaded", ()=>{
  document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    let email=document.getElementById("loginEmail").value;
    let password=document.getElementById("loginPassword").value;
    let user=JSON.parse(localStorage.getItem("user"));

    if(user && user.email===email && user.password===password){
      localStorage.setItem("isLoggedIn", true);
      window.location.href="index.html";
    } else {
      document.getElementById("loginMessage").innerText="❌ Invalid credentials!";
    }
  });
});
</script>
</body>
</html>
