<h2>Issued Books</h2>
<div id="issuedList"></div>
<footer>
  <p>📍 MyLibrary, Narsipatnam, Andhra Pradesh, India</p>
  <p>🕒 Mon–Sat: 9 AM – 8 PM</p>
  <p>📧 support@mylibrary.com</p>
  <div class="socials">
    <a href="#">Facebook</a> | <a href="#">Instagram</a> | <a href="#">Twitter</a>
  </div>
  <p>© 2026 MyLibrary</p>
</footer>
<script>
function loadIssued(){
  let issued=JSON.parse(localStorage.getItem("issuedBooks"))||[];
  let container=document.getElementById("issuedList");
  container.innerHTML="";
  if(issued.length===0){
    container.innerHTML="<p>No books issued.</p>";
    return;
  }
  issued.forEach((b,i)=>{
    container.innerHTML+=`
      <div>
        <h3>${b.title}</h3>
        <p>${b.author}</p>
        <p>Issued on: ${b.date}</p>
        <button onclick="returnBook(${i})">Return</button>
      </div>`;
  });
}

function returnBook(index){
  let issued = JSON.parse(localStorage.getItem("issuedBooks")) || [];
  let book = issued[index];

  // Remove from issued list
  issued.splice(index,1);
  localStorage.setItem("issuedBooks", JSON.stringify(issued));

  // Reset availability in main books list
  let books = JSON.parse(localStorage.getItem("books")) || [];
  let libBook = books.find(b => b.title === book.title);
  if(libBook) libBook.available = true;
  localStorage.setItem("books", JSON.stringify(books));

  loadIssued();
}

document.addEventListener("DOMContentLoaded", loadIssued);

</script>
