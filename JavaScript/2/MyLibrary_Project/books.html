<div class="container">

<h2>Books</h2>
<div id="bookList"></div>

<script>
let books=getBooks();
let container=document.getElementById("bookList");
books.forEach(b=>{
    container.innerHTML+=`
    <div class="book-card">
        <h3>${b.title}</h3>
        <p>Author: ${b.author}</p>
        <p>Category: ${b.category}</p>
        <p>Status: ${b.status}</p>
        ${b.status==="Available" ? `<button onclick="issueBook(${b.id})">Issue Book</button>` : ""}
    </div>`;
});
</script>

</div>
