<div class="container">

<h2>Issued Books</h2>
<div id="issuedList"></div>

<script>
let issued=JSON.parse(localStorage.getItem("issued"))||[];
let container=document.getElementById("issuedList");
if(issued.length===0){
    container.innerHTML="<p>No books issued.</p>";
} else {
    issued.forEach(b=>{
        container.innerHTML+=`
        <div class="book-card">
            <h3>${b.title}</h3>
            <p>Author: ${b.author}</p>
            <p>Issue Date: ${b.issueDate}</p>
            <button onclick="returnBook(${b.id})">Return</button>
        </div>`;
    });
}
</script>

</div>
